<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060914" />
    <title>霓虹线途</title>
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="霓虹线途游戏画面"></canvas>
      <div class="hud" aria-live="polite"><span class="hud-label">距离</span><strong id="distance">0000</strong><span class="unit">m</span></div>
      <section class="overlay" id="overlay">
        <p class="eyebrow">NEON LINE</p>
        <h1 id="overlay-title">霓虹线途</h1>
        <p class="message" id="overlay-message">按住屏幕或鼠标上抬<br />松开后自然下落</p>
        <button id="start-button" type="button">开始穿行</button>
        <p class="hint" id="overlay-hint">线头碰到墙壁即失败</p>
      </section>
      <p class="control-tip" id="control-tip">按住上抬 · 松开下落</p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
