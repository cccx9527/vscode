<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>霓虹线途：弧形回廊</title><style>
html,body{margin:0;overflow:hidden;background:#060914;color:#eafcff;font-family:system-ui,"Microsoft YaHei"}canvas{display:block;touch-action:none}.hud{position:fixed;top:30px;left:35px;letter-spacing:.15em;color:#79a9b6;font-size:12px}.hud b{display:block;font-size:38px;color:#dfffff;text-shadow:0 0 16px #38efff;font-weight:400}.cover{position:fixed;inset:0;display:grid;place-content:center;justify-items:center;text-align:center;background:radial-gradient(circle,rgba(8,35,58,.4),rgba(6,9,20,.76));gap:16px}.hide{display:none}.tag{color:#42e9f5;letter-spacing:.2em;font-size:12px}h1{font-size:clamp(42px,9vw,76px);margin:0;text-shadow:0 0 25px #38efff}p{line-height:1.8;color:#c6e9ef}button{border:1px solid #58efff;border-radius:999px;padding:14px 30px;background:#71f3ff;color:#031219;font-weight:700;font-size:16px;cursor:pointer}.tip{position:fixed;bottom:28px;width:100%;text-align:center;color:#a2d9e1;font-size:13px}.level{position:fixed;top:34px;right:35px;color:#42e9f5;font-size:12px;letter-spacing:.16em}</style></head><body>
<canvas id="game"></canvas><div class="hud">距离<b id="score">0000</b></div><div class="level">弧形回廊 · 01</div><section class="cover" id="cover"><span class="tag">NEON LINE</span><h1 id="title">弧形回廊</h1><p id="text">粉色弧线是墙，黑色区域才是通道。<br>按住向上转，松开向下转，持续修正轨迹。</p><button id="go">开始穿行</button></section><div class="tip">按住上抬 · 松开下落</div>
<script>
const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),cover=document.querySelector('#cover'),go=document.querySelector('#go'),title=document.querySelector('#title'),text=document.querySelector('#text'),score=document.querySelector('#score');let width,height,dpr,state='intro',held=false,last=0,head,heading,trail,camera;const H=900,START={x:130,y:450},R=10,SPEED=230,TURN=1.25,MAX=Math.PI/3,HALF=78,COURSE_START=620,SEGMENT=570,FINISH=2520;const bends=[-1,1,-1];
function resize(){dpr=Math.min(devicePixelRatio||1,2);width=innerWidth;height=innerHeight;canvas.width=width*dpr;canvas.height=height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
function centerAt(x){if(x<COURSE_START||x>COURSE_START+SEGMENT*bends.length)return 450;const i=Math.min(bends.length-1,Math.floor((x-COURSE_START)/SEGMENT)),t=(x-COURSE_START-i*SEGMENT)/SEGMENT;return 450+bends[i]*165*Math.sin(Math.PI*t)}
function reset(){state='play';held=false;head={...START};heading=0;trail=[{...head}];camera=0;score.textContent='0000';cover.classList.add('hide')}
function end(win){state='end';held=false;title.textContent=win?'回廊穿行成功':'信号中断';text.innerHTML=win?'你保持在通道内直到终点。<br>下一关会缩窄通道并加快节奏。':'碰到了弧形墙。<br>早点调整方向，别等到贴墙再转。';go.textContent='再来一次';cover.classList.remove('hide')}
function update(dt){if(state!=='play')return;heading=Math.max(-MAX,Math.min(MAX,heading+(held?-TURN:TURN)*dt));head.x+=Math.cos(heading)*SPEED*dt;head.y+=Math.sin(heading)*SPEED*dt;trail.push({...head});if(trail.length>190)trail.shift();camera+=(head.x-width*.28-camera)*Math.min(1,dt*5.5);score.textContent=Math.max(0,Math.floor(head.x-START.x)).toString().padStart(4,'0');const insideCourse=head.x>=COURSE_START-12&&head.x<=COURSE_START+SEGMENT*bends.length+12;if(head.y<R||head.y>H-R||(insideCourse&&Math.abs(head.y-centerAt(head.x))>HALF-R))end(false);else if(head.x>=FINISH)end(true)}
function screen(x,y){return{x:x-camera,y:y-(450-height/2)}}
function strokeWall(offset){ctx.beginPath();for(let x=Math.floor(camera/12)*12-12;x<=camera+width+12;x+=12){const p=screen(x,centerAt(x)+offset);x===Math.floor(camera/12)*12-12?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)}ctx.stroke()}
function draw(){const top=450-height/2,g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,'#071323');g.addColorStop(.5,'#060914');g.addColorStop(1,'#100716');ctx.fillStyle=g;ctx.fillRect(0,0,width,height);ctx.strokeStyle='rgba(82,194,216,.08)';ctx.lineWidth=1;for(let y=Math.ceil(top/100)*100;y<top+height;y+=100){ctx.beginPath();ctx.moveTo(0,y-top);ctx.lineTo(width,y-top);ctx.stroke()}ctx.save();ctx.strokeStyle='rgba(255,53,153,.22)';ctx.lineWidth=35;ctx.shadowColor='#ff3a9b';ctx.shadowBlur=18;strokeWall(-HALF);strokeWall(HALF);ctx.strokeStyle='#ff429e';ctx.lineWidth=19;ctx.shadowBlur=12;strokeWall(-HALF);strokeWall(HALF);ctx.strokeStyle='rgba(255,238,249,.72)';ctx.lineWidth=2;ctx.shadowBlur=0;strokeWall(-HALF);strokeWall(HALF);ctx.restore();for(let i=0;i<bends.length;i++){const x=COURSE_START+i*SEGMENT+SEGMENT/2-camera,y=450-(height/2)+(bends[i]*165);ctx.strokeStyle='rgba(76,240,255,.14)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,165,0,Math.PI*2);ctx.stroke()}const finish=FINISH-camera;if(finish>-30&&finish<width+30){ctx.strokeStyle='#ffe86b';ctx.lineWidth=4;ctx.shadowColor='#ffe86b';ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(finish,0);ctx.lineTo(finish,height);ctx.stroke()}if(state!=='intro'){ctx.save();ctx.lineCap='round';for(const [lw,a]of[[15,.12],[6,.8]]){ctx.beginPath();trail.forEach((p,i)=>{const q=screen(p.x,p.y);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.lineWidth=lw;ctx.strokeStyle=`rgba(68,242,255,${a})`;ctx.shadowColor='#37eefa';ctx.shadowBlur=18;ctx.stroke()}const q=screen(head.x,head.y);ctx.fillStyle='#efffff';ctx.beginPath();ctx.arc(q.x,q.y,R,0,Math.PI*2);ctx.fill();ctx.restore()}}
function frame(time){update(Math.min((time-last)/1000||0,.035));last=time;draw();requestAnimationFrame(frame)}go.onclick=reset;canvas.onpointerdown=e=>{e.preventDefault();if(state!=='play')reset();held=true};onpointerup=()=>held=false;onblur=()=>held=false;onresize=resize;resize();requestAnimationFrame(frame);
</script></body></html>
