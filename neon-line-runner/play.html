<!doctype html>
<html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>霓虹线途</title>
<style>html,body{margin:0;overflow:hidden;background:#060914;color:#eafcff;font-family:system-ui,"Microsoft YaHei"}canvas{display:block;touch-action:none}.hud{position:fixed;top:30px;left:35px;letter-spacing:.15em;color:#79a9b6;font-size:12px}.hud b{display:block;font-size:38px;color:#dfffff;text-shadow:0 0 16px #38efff;font-weight:400}.cover{position:fixed;inset:0;display:grid;place-content:center;justify-items:center;text-align:center;background:radial-gradient(circle,rgba(8,35,58,.4),rgba(6,9,20,.7));gap:16px}.hide{display:none}.tag{color:#42e9f5;letter-spacing:.2em;font-size:12px}h1{font-size:clamp(42px,9vw,76px);margin:0;text-shadow:0 0 25px #38efff}p{line-height:1.8;color:#c6e9ef}button{border:1px solid #58efff;border-radius:999px;padding:14px 30px;background:#71f3ff;color:#031219;font-weight:700;font-size:16px;cursor:pointer}.tip{position:fixed;bottom:28px;width:100%;text-align:center;color:#a2d9e1;font-size:13px}</style>
<canvas id="game"></canvas><div class="hud">距离<b id="score">0000</b></div><section class="cover" id="cover"><span class="tag">NEON LINE</span><h1 id="title">霓虹线途</h1><p id="text">按住屏幕或鼠标上抬<br>松开后自然下落</p><button id="go">开始穿行</button></section><div class="tip">按住上抬 · 松开下落</div>
<script>
const c=document.querySelector('#game'),x=c.getContext('2d'),cover=document.querySelector('#cover'),go=document.querySelector('#go'),title=document.querySelector('#title'),text=document.querySelector('#text'),score=document.querySelector('#score');let w,h,dpr,state='intro',held=false,last=0,head,angle,trail,cam;const H=900,R=11,S=255,T=1.45,A=Math.PI/3.15,FIN=4950;const gaps=[[280,500],[510,735],[185,405],[550,760],[320,525],[620,825],[145,350],[465,675],[235,450],[575,790]],walls=gaps.flatMap(([a,b],i)=>{let q=700+i*(i===1?390:410);return[{x:q,y:0,w:60,h:a},{x:q,y:b,w:60,h:H-b}]});function size(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;c.width=w*dpr;c.height=h*dpr;x.setTransform(dpr,0,0,dpr,0,0)}function reset(){state='play';held=false;head={x:140,y:450};angle=0;trail=[{...head}];cam=0;score.textContent='0000';cover.classList.add('hide')}function hit(r){let a=Math.max(r.x,Math.min(head.x,r.x+r.w)),b=Math.max(r.y,Math.min(head.y,r.y+r.h));return(head.x-a)**2+(head.y-b)**2<=R**2}function end(win){state='end';held=false;title.textContent=win?'穿行成功':'信号中断';text.innerHTML=win?'你抵达了终点<br>再来一次，跑得更漂亮。':'线头撞上了障碍<br>调整转向节奏，再试一次。';go.textContent='再来一次';cover.classList.remove('hide')}function update(dt){if(state!=='play')return;angle=Math.max(-A,Math.min(A,angle+(held?-T:T)*dt));head.x+=Math.cos(angle)*S*dt;head.y+=Math.sin(angle)*S*dt;trail.push({...head});if(trail.length>170)trail.shift();cam+=(head.x-w*.28-cam)*Math.min(1,dt*5.5);score.textContent=Math.max(0,Math.floor(head.x-140)).toString().padStart(4,'0');if(head.y-R<0||head.y+R>H||walls.some(hit))end(false);else if(head.x>=FIN)end(true)}function draw(){let top=450-h/2,g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,'#071323');g.addColorStop(.5,'#060914');g.addColorStop(1,'#100716');x.fillStyle=g;x.fillRect(0,0,w,h);x.strokeStyle='rgba(82,194,216,.08)';for(let y=Math.ceil(top/100)*100;y<top+h;y+=100){x.beginPath();x.moveTo(0,y-top);x.lineTo(w,y-top);x.stroke()}walls.forEach(r=>{let X=r.x-cam,Y=r.y-top;if(X>w||X+r.w<0)return;x.shadowColor='#ff3a9b';x.shadowBlur=18;x.fillStyle='rgba(255,48,144,.84)';x.fillRect(X,Y,r.w,r.h)});if(state!=='intro'){for(let [lw,a]of[[14,.12],[6,.72]]){x.beginPath();trail.forEach((p,i)=>i?x.lineTo(p.x-cam,p.y-top):x.moveTo(p.x-cam,p.y-top));x.lineWidth=lw;x.strokeStyle=`rgba(68,242,255,${a})`;x.shadowColor='#37eefa';x.shadowBlur=18;x.stroke()}x.fillStyle='#e9ffff';x.beginPath();x.arc(head.x-cam,head.y-top,R,0,7);x.fill()}}function loop(t){update(Math.min((t-last)/1000||0,.035));last=t;draw();requestAnimationFrame(loop)}go.onclick=reset;c.onpointerdown=e=>{e.preventDefault();if(state!=='play')reset();held=true};onpointerup=()=>held=false;onblur=()=>held=false;onresize=size;size();requestAnimationFrame(loop);
</script>
