<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>霓虹线途：环轨试炼</title>
<style>html,body{margin:0;overflow:hidden;background:#060914;color:#eafcff;font-family:system-ui,"Microsoft YaHei"}canvas{display:block;touch-action:none}.hud{position:fixed;top:30px;left:35px;letter-spacing:.15em;color:#79a9b6;font-size:12px}.hud b{display:block;font-size:38px;color:#dfffff;text-shadow:0 0 16px #38efff;font-weight:400}.cover{position:fixed;inset:0;display:grid;place-content:center;justify-items:center;text-align:center;background:radial-gradient(circle,rgba(8,35,58,.4),rgba(6,9,20,.75));gap:16px}.hide{display:none}.tag{color:#42e9f5;letter-spacing:.2em;font-size:12px}h1{font-size:clamp(42px,9vw,76px);margin:0;text-shadow:0 0 25px #38efff}p{line-height:1.8;color:#c6e9ef}button{border:1px solid #58efff;border-radius:999px;padding:14px 30px;background:#71f3ff;color:#031219;font-weight:700;font-size:16px;cursor:pointer}.tip{position:fixed;bottom:28px;width:100%;text-align:center;color:#a2d9e1;font-size:13px}.level{position:fixed;top:34px;right:35px;color:#42e9f5;font-size:12px;letter-spacing:.16em}</style></head><body>
<canvas id="game"></canvas><div class="hud">距离<b id="score">0000</b></div><div class="level">环轨试炼 · 01</div><section class="cover" id="cover"><span class="tag">NEON LINE</span><h1 id="title">环轨试炼</h1><p id="text">按住会向上转弯，松开会向下转弯。<br>让线头始终留在发光的环形通道中。</p><button id="go">开始穿行</button></section><div class="tip">按住上抬 · 松开下落</div>
<script>
const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),cover=document.querySelector('#cover'),go=document.querySelector('#go'),title=document.querySelector('#title'),text=document.querySelector('#text'),score=document.querySelector('#score');let w,h,dpr,state='intro',held=false,last=0,head,heading,trail,camera,active=0;const H=900,START={x:150,y:450},R=10,SPEED=240,TURN=1.35,MAX=Math.PI/2.35,TRAIL=190,FINISH=3160;const tunnels=[{x:1000,y:450,r:205,from:Math.PI,to:0,dir:-1,label:'按住 · 上弧'},{x:1900,y:450,r:205,from:Math.PI,to:Math.PI*2,dir:1,label:'松开 · 下弧'},{x:2800,y:450,r:205,from:Math.PI,to:0,dir:-1,label:'按住 · 上弧'}];function resize(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}function reset(){state='play';held=false;head={...START};heading=0;trail=[{...head}];camera=0;active=0;score.textContent='0000';cover.classList.add('hide')}function end(win){state='end';held=false;title.textContent=win?'环轨穿行成功':'信号中断';text.innerHTML=win?'你完成了环形通道。<br>下一关会加入更紧的连续弯道。':'线头离开了环形通道。<br>试着更早开始转向，并持续微调。';go.textContent='再来一次';cover.classList.remove('hide')}function angleOf(t){return(Math.atan2(head.y-t.y,head.x-t.x)+Math.PI*2)%(Math.PI*2)}function inArc(t){const p=angleOf(t);return t.dir<0?p<=Math.PI+.1:p>=Math.PI-.1}function update(dt){if(state!=='play')return;heading=Math.max(-MAX,Math.min(MAX,heading+(held?-TURN:TURN)*dt));head.x+=Math.cos(heading)*SPEED*dt;head.y+=Math.sin(heading)*SPEED*dt;trail.push({...head});if(trail.length>TRAIL)trail.shift();camera+=(head.x-w*.28-camera)*Math.min(1,dt*5.5);score.textContent=Math.max(0,Math.floor(head.x-START.x)).toString().padStart(4,'0');const t=tunnels[active];if(t&&head.x>=t.x-t.r-18){const dist=Math.hypot(head.x-t.x,head.y-t.y),onTrack=dist>t.r-31&&dist<t.r+31&&inArc(t);if(!onTrack)return end(false);const a=angleOf(t),passed=t.dir<0?a<.11:a>Math.PI*2-.11;if(passed&&head.x>t.x+t.r-20)active++}if(head.y<R||head.y>H-R)return end(false);if(head.x>=FINISH)end(true)}function screen(p){return{x:p.x-camera,y:p.y-(450-h/2)}}function drawArc(t,index){const c=screen(t);ctx.save();ctx.lineCap='round';ctx.strokeStyle='rgba(255,59,159,.17)';ctx.lineWidth=76;ctx.shadowColor='#ff3a9b';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(c.x,c.y,t.r,t.from,t.to,t.dir>0);ctx.stroke();ctx.strokeStyle=index===active?'#64f7ff':'#ff4cac';ctx.lineWidth=58;ctx.shadowColor=index===active?'#37eefa':'#ff3a9b';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(c.x,c.y,t.r,t.from,t.to,t.dir>0);ctx.stroke();ctx.strokeStyle='rgba(230,255,255,.68)';ctx.lineWidth=2;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(c.x,c.y,t.r,t.from,t.to,t.dir>0);ctx.stroke();ctx.fillStyle=index===active?'#dfffff':'#ffb5d9';ctx.font='700 12px system-ui';ctx.fillText(t.label,c.x-42,c.y+(t.dir<0?-t.r-48:t.r+48));ctx.restore()}function draw(){const top=450-h/2,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#071323');g.addColorStop(.5,'#060914');g.addColorStop(1,'#100716');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,194,216,.08)';ctx.lineWidth=1;for(let y=Math.ceil(top/100)*100;y<top+h;y+=100){ctx.beginPath();ctx.moveTo(0,y-top);ctx.lineTo(w,y-top);ctx.stroke()}tunnels.forEach(drawArc);const finish=FINISH-camera;if(finish>-30&&finish<w+30){ctx.strokeStyle='#ffe86b';ctx.lineWidth=4;ctx.shadowColor='#ffe86b';ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(finish,0);ctx.lineTo(finish,h);ctx.stroke()}if(state!=='intro'){ctx.save();ctx.lineCap='round';for(const [lw,a]of[[15,.12],[6,.8]]){ctx.beginPath();trail.forEach((p,i)=>{const q=screen(p);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.lineWidth=lw;ctx.strokeStyle=`rgba(68,242,255,${a})`;ctx.shadowColor='#37eefa';ctx.shadowBlur=18;ctx.stroke()}const q=screen(head);ctx.fillStyle='#efffff';ctx.beginPath();ctx.arc(q.x,q.y,R,0,Math.PI*2);ctx.fill();ctx.restore()}}function frame(time){update(Math.min((time-last)/1000||0,.035));last=time;draw();requestAnimationFrame(frame)}go.onclick=reset;canvas.onpointerdown=e=>{e.preventDefault();if(state!=='play')reset();held=true};onpointerup=()=>held=false;onblur=()=>held=false;onresize=resize;resize();requestAnimationFrame(frame);
</script><script>
// Canvas 的 y 轴向下；将角度统一到 0 至 2π 后，上弧位于 π 至 2π，下弧位于 0 至 π。
function inArc(t){const p=angleOf(t);return t.dir<0?p>=Math.PI-.1:p<=Math.PI+.1}
</script><script>
// 圆环是实体墙：从入口进入圆内，再控制线头从下一道缺口离开。
const orbitWalls=[
  {x:980,y:450,r:205,gaps:[[Math.PI,.28],[0,.28]]},
  {x:1700,y:450,r:205,gaps:[[Math.PI,.28],[Math.PI*2-.62,.30]]},
  {x:2420,y:450,r:205,gaps:[[Math.PI+.62,.30],[0,.28]]}
];
function orbitAngle(p,wall){return(Math.atan2(p.y-wall.y,p.x-wall.x)+Math.PI*2)%(Math.PI*2)}
function atGap(angle,wall){return wall.gaps.some(([center,size])=>Math.abs(((angle-center+Math.PI*3)%(Math.PI*2))-Math.PI)<size)}
function hitsOrbit(wall){const distance=Math.hypot(head.x-wall.x,head.y-wall.y);return Math.abs(distance-wall.r)<34&&!atGap(orbitAngle(head,wall),wall)}
function update(dt){if(state!=='play')return;heading=Math.max(-MAX,Math.min(MAX,heading+(held?-TURN:TURN)*dt));head.x+=Math.cos(heading)*SPEED*dt;head.y+=Math.sin(heading)*SPEED*dt;trail.push({...head});if(trail.length>TRAIL)trail.shift();camera+=(head.x-w*.28-camera)*Math.min(1,dt*5.5);score.textContent=Math.max(0,Math.floor(head.x-START.x)).toString().padStart(4,'0');if(head.y<R||head.y>H-R||orbitWalls.some(hitsOrbit))end(false);else if(head.x>=3160)end(true)}
function drawOrbit(wall,index){const center=screen(wall),cuts=wall.gaps.map(([angle,size])=>[angle-size,angle+size]).sort((a,b)=>a[0]-b[0]);const pieces=[];let start=0;for(const [from,to]of cuts){if(from>start)pieces.push([start,from]);start=to}if(start<Math.PI*2)pieces.push([start,Math.PI*2]);ctx.save();ctx.lineCap='round';for(const [from,to]of pieces){ctx.strokeStyle='rgba(255,57,153,.82)';ctx.lineWidth=64;ctx.shadowColor='#ff3a9b';ctx.shadowBlur=19;ctx.beginPath();ctx.arc(center.x,center.y,wall.r,from,to);ctx.stroke();ctx.strokeStyle='rgba(255,238,249,.65)';ctx.lineWidth=2;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(center.x,center.y,wall.r,from,to);ctx.stroke()}ctx.fillStyle='#ffb3d8';ctx.font='700 12px system-ui';ctx.fillText(`环墙 ${index+1}`,center.x-22,center.y-wall.r-46);ctx.restore()}
function draw(){const top=450-h/2,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#071323');g.addColorStop(.5,'#060914');g.addColorStop(1,'#100716');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,194,216,.08)';ctx.lineWidth=1;for(let y=Math.ceil(top/100)*100;y<top+h;y+=100){ctx.beginPath();ctx.moveTo(0,y-top);ctx.lineTo(w,y-top);ctx.stroke()}orbitWalls.forEach(drawOrbit);const finish=3160-camera;if(finish>-30&&finish<w+30){ctx.strokeStyle='#ffe86b';ctx.lineWidth=4;ctx.shadowColor='#ffe86b';ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(finish,0);ctx.lineTo(finish,h);ctx.stroke()}if(state!=='intro'){ctx.save();ctx.lineCap='round';for(const [lw,a]of[[15,.12],[6,.8]]){ctx.beginPath();trail.forEach((p,i)=>{const q=screen(p);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.lineWidth=lw;ctx.strokeStyle=`rgba(68,242,255,${a})`;ctx.shadowColor='#37eefa';ctx.shadowBlur=18;ctx.stroke()}const q=screen(head);ctx.fillStyle='#efffff';ctx.beginPath();ctx.arc(q.x,q.y,R,0,Math.PI*2);ctx.fill();ctx.restore()}}
</script></body></html>
