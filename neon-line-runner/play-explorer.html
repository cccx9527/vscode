<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>霓虹线途：分岔长廊</title><style>html,body{margin:0;overflow:hidden;background:#060914;color:#eafcff;font-family:system-ui,"Microsoft YaHei"}canvas{display:block;touch-action:none}.hud{position:fixed;top:30px;left:35px;letter-spacing:.15em;color:#79a9b6;font-size:12px}.hud b{display:block;font-size:38px;color:#dfffff;text-shadow:0 0 16px #38efff;font-weight:400}.level{position:fixed;top:34px;right:35px;color:#42e9f5;font-size:12px;letter-spacing:.16em}.cover{position:fixed;inset:0;display:grid;place-content:center;justify-items:center;text-align:center;background:radial-gradient(circle,rgba(8,35,58,.4),rgba(6,9,20,.76));gap:16px}.hide{display:none}.tag{color:#42e9f5;letter-spacing:.2em;font-size:12px}h1{font-size:clamp(42px,9vw,76px);margin:0;text-shadow:0 0 25px #38efff}p{line-height:1.8;color:#c6e9ef}button{border:1px solid #58efff;border-radius:999px;padding:14px 30px;background:#71f3ff;color:#031219;font-weight:700;font-size:16px;cursor:pointer}.tip{position:fixed;bottom:28px;width:100%;text-align:center;color:#a2d9e1;font-size:13px}</style></head><body>
<canvas id="game"></canvas><div class="hud">距离<b id="score">0000</b></div><div class="level">分岔长廊 · 01</div><section class="cover" id="cover"><span class="tag">NEON LINE</span><h1 id="title">分岔长廊</h1><p id="text">黑色弧形带是安全通道；粉色弧线与墙壁是障碍。<br>按住上转，松开下转。在分岔处任选上路或下路。</p><button id="go">开始穿行</button></section><div class="tip">按住上抬 · 松开下落</div>
<script>
const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),cover=document.querySelector('#cover'),go=document.querySelector('#go'),title=document.querySelector('#title'),text=document.querySelector('#text'),score=document.querySelector('#score');let w,h,dpr,state='intro',held=false,last=0,head,heading,trail,camera;const H=900,START={x:130,y:450},R=10,SPEED=220,TURN=1.22,MAX=Math.PI/3,HALF=76,START_X=620,LEN=560,BRANCH_START=2300,BRANCH_LEN=850,FINISH=4480;const bends=[-1,1,-1,1,-1,1];const gates=[{x:1120,y:385,gap:35},{x:1850,y:520,gap:34},{x:3580,y:370,gap:34},{x:4160,y:530,gap:34}];
function resize(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}function mainCenter(x){if(x<START_X)return 450;const i=Math.min(bends.length-1,Math.floor((x-START_X)/LEN));const t=Math.max(0,Math.min(1,(x-START_X-i*LEN)/LEN));return 450+bends[i]*158*Math.sin(Math.PI*t)}function centersAt(x){if(x<BRANCH_START||x>BRANCH_START+BRANCH_LEN)return[mainCenter(x)];const t=(x-BRANCH_START)/BRANCH_LEN,base=mainCenter(x),spread=155*Math.sin(Math.PI*t);return[base-spread,base+spread]}function safeAt(x,y){return centersAt(x).some(center=>Math.abs(y-center)<=HALF-R)}function reset(){state='play';held=false;head={...START};heading=0;trail=[{...head}];camera=0;score.textContent='0000';cover.classList.add('hide')}function end(win){state='end';held=false;title.textContent=win?'探索成功':'信号中断';text.innerHTML=win?'你穿过了所有弧形通道与岔路。<br>每条分岔路都能抵达终点。':'你撞上了墙壁。<br>在缺口前提前微调，分岔时选择一条黑色通道。';go.textContent='再来一次';cover.classList.remove('hide')}function hitsGate(gate){return Math.abs(head.x-gate.x)<18&&Math.abs(head.y-gate.y)>gate.gap+R}function update(dt){if(state!=='play')return;heading=Math.max(-MAX,Math.min(MAX,heading+(held?-TURN:TURN)*dt));head.x+=Math.cos(heading)*SPEED*dt;head.y+=Math.sin(heading)*SPEED*dt;trail.push({...head});if(trail.length>200)trail.shift();camera+=(head.x-w*.28-camera)*Math.min(1,dt*5.5);score.textContent=Math.max(0,Math.floor(head.x-START.x)).toString().padStart(4,'0');const inCourse=head.x>=START_X-12&&head.x<=START_X+bends.length*LEN+12;if(head.y<R||head.y>H-R||(inCourse&&!safeAt(head.x,head.y))||gates.some(hitsGate))end(false);else if(head.x>=FINISH)end(true)}function screen(x,y){return{x:x-camera,y:y-(450-h/2)}}function strokeBoundary(path,offset){ctx.beginPath();let first=true;for(let x=Math.floor(camera/10)*10-10;x<=camera+w+10;x+=10){const p=screen(x,path(x)+offset);if(first){ctx.moveTo(p.x,p.y);first=false}else ctx.lineTo(p.x,p.y)}ctx.stroke()}function wall(path,offset){ctx.strokeStyle='rgba(255,52,153,.22)';ctx.lineWidth=34;ctx.shadowColor='#ff3a9b';ctx.shadowBlur=17;strokeBoundary(path,offset);ctx.strokeStyle='#ff429e';ctx.lineWidth=18;ctx.shadowBlur=11;strokeBoundary(path,offset);ctx.strokeStyle='rgba(255,238,249,.7)';ctx.lineWidth=2;ctx.shadowBlur=0;strokeBoundary(path,offset)}function drawGate(gate){const x=gate.x-camera,y=gate.y-(450-h/2);if(x<-30||x>w+30)return;ctx.save();ctx.shadowColor='#ff3a9b';ctx.shadowBlur=16;ctx.fillStyle='#ff429e';ctx.fillRect(x-15,0,30,y-gate.gap);ctx.fillRect(x-15,y+gate.gap,30,h-(y+gate.gap));ctx.fillStyle='rgba(255,238,249,.68)';ctx.fillRect(x-10,0,2,y-gate.gap);ctx.fillRect(x-10,y+gate.gap,2,h-(y+gate.gap));ctx.restore()}function draw(){const top=450-h/2,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#071323');g.addColorStop(.5,'#060914');g.addColorStop(1,'#100716');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(82,194,216,.08)';ctx.lineWidth=1;for(let y=Math.ceil(top/100)*100;y<top+h;y+=100){ctx.beginPath();ctx.moveTo(0,y-top);ctx.lineTo(w,y-top);ctx.stroke()}ctx.save();wall(mainCenter,-HALF);wall(mainCenter,HALF);const branchPath=(sign)=>x=>{const t=Math.max(0,Math.min(1,(x-BRANCH_START)/BRANCH_LEN));return mainCenter(x)+sign*155*Math.sin(Math.PI*t)};wall(branchPath(-1),-HALF);wall(branchPath(-1),HALF);wall(branchPath(1),-HALF);wall(branchPath(1),HALF);ctx.restore();gates.forEach(drawGate);const fork=screen(BRANCH_START+BRANCH_LEN/2,450);ctx.fillStyle='#8ddce5';ctx.font='700 12px system-ui';ctx.fillText('上路',fork.x-42,fork.y-165);ctx.fillText('下路',fork.x-42,fork.y+175);const finish=FINISH-camera;if(finish>-30&&finish<w+30){ctx.strokeStyle='#ffe86b';ctx.lineWidth=4;ctx.shadowColor='#ffe86b';ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(finish,0);ctx.lineTo(finish,h);ctx.stroke()}if(state!=='intro'){ctx.save();ctx.lineCap='round';for(const [lw,a]of[[15,.12],[6,.8]]){ctx.beginPath();trail.forEach((p,i)=>{const q=screen(p.x,p.y);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.lineWidth=lw;ctx.strokeStyle=`rgba(68,242,255,${a})`;ctx.shadowColor='#37eefa';ctx.shadowBlur=18;ctx.stroke()}const q=screen(head.x,head.y);ctx.fillStyle='#efffff';ctx.beginPath();ctx.arc(q.x,q.y,R,0,Math.PI*2);ctx.fill();ctx.restore()}}function frame(time){update(Math.min((time-last)/1000||0,.035));last=time;draw();requestAnimationFrame(frame)}go.onclick=reset;canvas.onpointerdown=e=>{e.preventDefault();if(state!=='play')reset();held=true};onpointerup=()=>held=false;onblur=()=>held=false;onresize=resize;resize();requestAnimationFrame(frame);
</script><script>
// 让每道缺口落在对应弧形通道的黑色区域内，确保所有障碍都有可通过的路线。
gates[1].y=375;
gates[2].y=555;
gates[3].y=500;
</script></body></html>
